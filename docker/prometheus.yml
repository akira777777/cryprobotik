# Prometheus scrape config for the Cryprobotik stack.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:
  - job_name: cryprobotik_bot
    metrics_path: /metrics
    static_configs:
      - targets: ["bot:8080"]
        labels:
          service: cryprobotik

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
